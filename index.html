<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">✦</div>
  <div class="header-info">
    <h1>AI Assistant</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span>Đang hoạt động</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="clearChat()" title="Xóa chat">🗑</button>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>Xin chào! Tôi là <span>AI Assistant</span></h2>
    <p>Tôi có thể giúp bạn trả lời câu hỏi, viết code, phân tích dữ liệu, và nhiều hơn nữa.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this)">✍️ Viết một đoạn email</button>
      <button class="suggestion" onclick="sendSuggestion(this)">💻 Giải thích một đoạn code</button>
      <button class="suggestion" onclick="sendSuggestion(this)">🌐 Dịch văn bản</button>
      <button class="suggestion" onclick="sendSuggestion(this)">📊 Phân tích dữ liệu</button>
      <button class="suggestion" onclick="sendSuggestion(this)">🎨 Lên ý tưởng sáng tạo</button>
      <button class="suggestion" onclick="sendSuggestion(this)">🔍 Tóm tắt nội dung</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="api-notice" id="apiNotice">
    ✅ API key đã được cấu hình. Chatbot sẵn sàng sử dụng!
    <button onclick="document.getElementById('apiNotice').style.display='none'" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#a78bfa;font-size:16px">×</button>
  </div>
  <div class="input-wrapper">
    <textarea id="userInput" placeholder="Nhắn tin..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-footer">Nhấn Enter để gửi · Shift+Enter để xuống dòng</div>
</div>

<script>
  const API_KEY = 'YOUR_API_KEY'; // ← Thay bằng API key của bạn
  const MODEL = 'claude-sonnet-4-20250514';

  let conversationHistory = [];
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^[^\w\s]+\s*/, '').trim();
    sendMessage();
  }

  function clearChat() {
    conversationHistory = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h2>Xin chào! Tôi là <span>AI Assistant</span></h2>
        <p>Tôi có thể giúp bạn trả lời câu hỏi, viết code, phân tích dữ liệu, và nhiều hơn nữa.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">✍️ Viết một đoạn email</button>
          <button class="suggestion" onclick="sendSuggestion(this)">💻 Giải thích một đoạn code</button>
          <button class="suggestion" onclick="sendSuggestion(this)">🌐 Dịch văn bản</button>
          <button class="suggestion" onclick="sendSuggestion(this)">📊 Phân tích dữ liệu</button>
          <button class="suggestion" onclick="sendSuggestion(this)">🎨 Lên ý tưởng sáng tạo</button>
          <button class="suggestion" onclick="sendSuggestion(this)">🔍 Tóm tắt nội dung</button>
        </div>
      </div>`;
  }

  function appendMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatContent(content);

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function formatContent(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escHtml(code.trim())}</code></pre>`);
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1024,
          system: 'Bạn là một trợ lý AI thông minh, thân thiện và hữu ích. Trả lời bằng tiếng Việt nếu người dùng dùng tiếng Việt.',
          messages: conversationHistory
        })
      });
      const data = await response.json();
      removeTyping();

      if (data.error) {
        appendMessage('ai', `❌ Lỗi: ${data.error.message}`);
      } else {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'assistant', content: reply });
        appendMessage('ai', reply);
      }
    } catch (err) {
      removeTyping();
      appendMessage('ai', `❌ Lỗi kết nối: <code>${err.message}</code><br><br>
        Nếu bạn đang mở file trực tiếp (file://), hãy thử:<br>
        1. Dùng <strong>VS Code + Live Server</strong> extension<br>
        2. Hoặc chạy: <code>python3 -m http.server 3000</code> rồi vào <code>localhost:3000</code>`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
